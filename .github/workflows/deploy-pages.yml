# Construye el sitio con MkDocs y lo publica en GitHub Pages.
# Ajusta en el repo: Settings → Pages → Source: "GitHub Actions" (no rama /site).

name: Desplegar documentación a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Construir sitio
        run: mkdocs build

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
